name: Scrape Raflaamo

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install --prefix /tmp/scraper @playwright/test @supabase/supabase-js
          npx --prefix /tmp/scraper playwright install chromium --with-deps

      - name: Run Raflaamo scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_PATH: /tmp/scraper/node_modules
        run: node scripts/scrape-raflaamo.mjs
        continue-on-error: true

      - name: Check scraper exit
        if: failure()
        run: echo "Raflaamo scraper epäonnistui — sivusto saattaa olla muuttunut tai väliaikaisesti alhaalla."
